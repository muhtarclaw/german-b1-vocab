<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Usage Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #login-screen input { padding: 12px 20px; font-size: 18px; border: 2px solid #333; border-radius: 8px; background: #1a1a2e; color: #fff; margin-bottom: 16px; width: 300px; }
        #login-screen button { padding: 12px 40px; font-size: 18px; background: #6366f1; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        #login-screen button:hover { background: #4f46e5; }
        #login-error { color: #ef4444; margin-top: 12px; display: none; }
        
        /* Dashboard */
        #dashboard { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { font-size: 28px; color: #6366f1; }
        .logout-btn { background: #374151; padding: 8px 20px; border: none; border-radius: 6px; color: #fff; cursor: pointer; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .account-card { background: #1a1a2e; border-radius: 16px; padding: 24px; border: 1px solid #333; }
        .account-card h2 { font-size: 20px; margin-bottom: 20px; color: #a5b4fc; display: flex; align-items: center; gap: 10px; }
        .account-card h2 span { font-size: 12px; background: #3730a3; padding: 4px 10px; border-radius: 20px; }
        .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #252540; }
        .stat-row:last-child { border: none; }
        .stat-label { color: #9ca3af; }
        .stat-value { font-weight: 600; font-size: 18px; }
        .stat-value.prompt { color: #60a5fa; }
        .stat-value.completion { color: #34d399; }
        .stat-value.requests { color: #f472b6; }
        .stat-value.total { color: #fbbf24; }
        
        /* Percentage Bar */
        .quota-bar { margin-top: 16px; background: #252540; border-radius: 8px; height: 24px; overflow: hidden; }
        .quota-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
        
        /* Actions */
        .actions { display: flex; gap: 12px; margin-top: 16px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-snapshot { background: #f59e0b; color: #000; }
        .btn-reset { background: #ef4444; color: #fff; }
        .btn:hover { opacity: 0.9; }
        
        /* Snapshots */
        .snapshots-section { background: #1a1a2e; border-radius: 16px; padding: 24px; border: 1px solid #333; }
        .snapshots-section h3 { font-size: 20px; margin-bottom: 20px; color: #f59e0b; }
        .snapshot-item { background: #252540; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .snapshot-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .snapshot-account { font-weight: 600; color: #a5b4fc; }
        .snapshot-reason { font-size: 12px; padding: 2px 8px; border-radius: 4px; background: #6366f1; }
        .snapshot-time { font-size: 12px; color: #6b7280; }
        .snapshot-data { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 12px; }
        .snapshot-stat { text-align: center; }
        .snapshot-stat .label { font-size: 11px; color: #6b7280; text-transform: uppercase; }
        .snapshot-stat .value { font-size: 18px; font-weight: 600; }
        
        .empty-state { text-align: center; padding: 40px; color: #6b7280; }
        
        /* Auto-refresh indicator */
        .refresh-info { text-align: right; font-size: 12px; color: #6b7280; margin-top: 8px; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <h1 style="margin-bottom: 30px; font-size: 32px;">🔐 Ollama Usage Dashboard</h1>
        <input type="password" id="password" placeholder="Enter password" onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">Access Dashboard</button>
        <p id="login-error">Incorrect password</p>
    </div>
    
    <!-- Dashboard -->
    <div id="dashboard" class="container">
        <div class="header">
            <h1>📊 Ollama Usage Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <div class="refresh-info">Auto-refreshes every 30 seconds • Last updated: <span id="last-updated">-</span></div>
        
        <div class="stats-grid" id="stats-grid">
            <!-- Populated by JS -->
        </div>
        
        <div class="snapshots-section">
            <h3>📸 Usage Snapshots (Pre-Fallback Archives)</h3>
            <div id="snapshots-list">
                <div class="empty-state">No snapshots yet. Snapshots are saved automatically when accounts are reset or fallbacks occur.</div>
            </div>
        </div>
    </div>
    
    <script>
        const API_KEY = 'ghp.2026';
        const API_BASE = window.location.origin;
        let refreshInterval;
        
        function login() {
            const pw = document.getElementById('password').value;
            if (pw === API_KEY) {
                sessionStorage.setItem('dash_auth', '1');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
                refreshInterval = setInterval(loadData, 30000);
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }
        
        function logout() {
            sessionStorage.removeItem('dash_auth');
            clearInterval(refreshInterval);
            location.reload();
        }
        
        async function api(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}?key=${API_KEY}`;
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }
        
        async function loadData() {
            try {
                const [usage, snapshots] = await Promise.all([
                    api('/api/usage'),
                    api('/api/snapshots')
                ]);
                renderUsage(usage);
                renderSnapshots(snapshots);
                document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }
        
        function renderUsage(usage) {
            const grid = document.getElementById('stats-grid');
            const accounts = ['ollama_account1', 'ollama_account2'];
            
            grid.innerHTML = accounts.map(acc => {
                const data = usage[acc] || { prompt_tokens: 0, completion_tokens: 0, requests: 0 };
                const total = data.prompt_tokens + data.completion_tokens;
                // Assume some arbitrary quota (you can adjust based on actual limits)
                const quota = 1000000;
                const percentage = Math.min((total / quota) * 100, 100).toFixed(1);
                
                return `
                    <div class="account-card">
                        <h2>${acc} <span>Active</span></h2>
                        <div class="stat-row">
                            <span class="stat-label">Prompt Tokens</span>
                            <span class="stat-value prompt">${data.prompt_tokens.toLocaleString()}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Completion Tokens</span>
                            <span class="stat-value completion">${data.completion_tokens.toLocaleString()}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Total Requests</span>
                            <span class="stat-value requests">${data.requests || 0}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Total Tokens</span>
                            <span class="stat-value total">${total.toLocaleString()}</span>
                        </div>
                        <div class="quota-bar">
                            <div class="quota-fill" style="width: ${percentage}%">${percentage}%</div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-snapshot" onclick="takeSnapshot('${acc}')">📸 Snapshot</button>
                            <button class="btn btn-reset" onclick="resetAccount('${acc}')">🔄 Reset</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderSnapshots(snapshots) {
            const list = document.getElementById('snapshots-list');
            
            if (!snapshots || snapshots.length === 0) {
                list.innerHTML = '<div class="empty-state">No snapshots yet.</div>';
                return;
            }
            
            list.innerHTML = snapshots.slice().reverse().map(s => `
                <div class="snapshot-item">
                    <div class="snapshot-header">
                        <span class="snapshot-account">${s.account}</span>
                        <span class="snapshot-reason">${s.reason}</span>
                    </div>
                    <div class="snapshot-time">${new Date(s.timestamp).toLocaleString()}</div>
                    <div class="snapshot-data">
                        <div class="snapshot-stat">
                            <div class="label">Prompt</div>
                            <div class="value" style="color:#60a5fa">${(s.data?.prompt_tokens || 0).toLocaleString()}</div>
                        </div>
                        <div class="snapshot-stat">
                            <div class="label">Completion</div>
                            <div class="value" style="color:#34d399">${(s.data?.completion_tokens || 0).toLocaleString()}</div>
                        </div>
                        <div class="snapshot-stat">
                            <div class="label">Requests</div>
                            <div class="value" style="color:#f472b6">${s.data?.requests || 0}</div>
                        </div>
                        <div class="snapshot-stat">
                            <div class="label">Total</div>
                            <div class="value" style="color:#fbbf24">${((s.data?.prompt_tokens||0) + (s.data?.completion_tokens||0)).toLocaleString()}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function takeSnapshot(account) {
            if (!confirm(`Take snapshot of ${account}?`)) return;
            await api('/api/snapshot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ account, reason: 'manual' })
            });
            loadData();
        }
        
        async function resetAccount(account) {
            if (!confirm(`Reset ${account}? This will save a snapshot first.`)) return;
            await api('/api/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ account })
            });
            loadData();
        }
        
        // Check session on load
        if (sessionStorage.getItem('dash_auth') === '1') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadData();
            refreshInterval = setInterval(loadData, 30000);
        }
    </script>
</body>
</html>
