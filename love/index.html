<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☕ Every Morning</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d1f3d 50%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      overflow: hidden;
    }
    
    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    
    .heart {
      position: absolute;
      font-size: 20px;
      animation: fall linear infinite;
      opacity: 0.6;
    }
    
    @keyframes fall {
      0% { transform: translateY(-100vh) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(720deg); }
    }
    
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }
    
    .coffee-cup {
      position: relative;
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .steam {
      position: absolute;
      font-size: 24px;
      top: -15px;
      opacity: 0.6;
      animation: steam 2s ease-in-out infinite;
    }
    .steam:nth-child(1) { left: 25%; animation-delay: 0s; }
    .steam:nth-child(2) { left: 50%; animation-delay: 0.4s; }
    .steam:nth-child(3) { left: 75%; animation-delay: 0.8s; }
    
    @keyframes steam {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50% { transform: translateY(-12px) scale(1.3); opacity: 0.2; }
    }
    
    h1 {
      font-size: 2.5em;
      margin-bottom: 30px;
      color: #ff6b9d;
      text-shadow: 0 0 30px rgba(255, 107, 157, 0.5);
    }
    
    .message {
      font-size: 1.6em;
      line-height: 1.8;
      margin-bottom: 40px;
      color: #f0e6ff;
    }
    
    .signature {
      font-size: 1.4em;
      color: #ff6b9d;
      font-style: italic;
    }
    
    .date {
      margin-top: 30px;
      font-size: 0.9em;
      color: rgba(255,255,255,0.5);
    }
    
    .reminder {
      margin-top: 50px;
      padding: 20px;
      border: 1px solid rgba(255,107,157,0.3);
      border-radius: 15px;
      background: rgba(255,107,157,0.1);
    }
    
    .reminder-text {
      font-size: 0.95em;
      color: rgba(255,255,255,0.7);
    }
    
    a {
      color: #ff6b9d;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>
  
  <div class="container">
    <div class="coffee-cup">
      ☕
      <span class="steam">☁️</span>
      <span class="steam">☁️</span>
      <span class="steam">☁️</span>
    </div>
    
    <h1>☕ Every Morning</h1>
    
    <div class="message">
      "I want to drink coffee<br>with you every morning"
    </div>
    
    <div class="signature">
      — ❤️
    </div>
    
    <div class="date">
      Every day, forever
    </div>
    
    <div class="reminder">
      <div class="reminder-text">
        ← <a href="../">Back to Daily Vocab</a>
      </div>
    </div>
  </div>
  
  <script>
    const hearts = document.getElementById('hearts');
    const heartEmojis = ['💕', '💖', '💗', '💝', '☕', '❤️'];
    
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
      heart.style.animationDuration = (Math.random() * 5 + 8) + 's';
      heart.style.animationDelay = Math.random() * 5 + 's';
      hearts.appendChild(heart);
      
      setTimeout(() => heart.remove(), 15000);
    }
    
    setInterval(createHeart, 500);
    for(let i = 0; i < 10; i++) createHeart();
  </script>
</body>
</html>
