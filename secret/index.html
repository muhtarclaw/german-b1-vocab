<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Private</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }
    
    .container {
      text-align: center;
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    
    .lock-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 1.5em;
      margin-bottom: 10px;
      color: #fff;
    }
    
    p {
      color: #888;
      margin-bottom: 30px;
    }
    
    input[type="password"] {
      width: 100%;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1em;
      text-align: center;
      margin-bottom: 15px;
    }
    
    input[type="password"]::placeholder {
      color: #666;
    }
    
    input[type="password"]:focus {
      outline: none;
      border-color: #e63946;
    }
    
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #e63946;
      color: #fff;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #d62839;
    }
    
    .error {
      color: #ff6b6b;
      margin-top: 15px;
      display: none;
    }
    
    .success {
      display: none;
      animation: fadeIn 0.5s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .heart {
      font-size: 80px;
      animation: pulse 1s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .message {
      font-size: 1.2em;
      margin-top: 20px;
      color: #ff6b9d;
    }
    
    .back {
      margin-top: 30px;
    }
    
    .back a {
      color: #888;
      text-decoration: none;
      font-size: 0.9em;
    }
    
    .back a:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container" id="login">
    <div class="lock-icon">🔐</div>
    <h1>Private Page</h1>
    <p>Enter password to continue</p>
    <input type="password" id="password" placeholder="Password" onkeypress="if(event.key==='Enter')checkPassword()">
    <button onclick="checkPassword()">Enter</button>
    <p class="error" id="error">Incorrect password. Try again.</p>
  </div>
  
  <div class="container success" id="success">
    <div class="heart">❤️</div>
    <div class="message">You are in!</div>
    <div class="back">
      <a href="../">← Back to Vocab</a>
    </div>
  </div>
  
  <script>
    const correctPassword = "ghp.2026";
    
    function checkPassword() {
      const input = document.getElementById("password").value;
      if (input === correctPassword) {
        document.getElementById("login").style.display = "none";
        document.getElementById("success").style.display = "block";
      } else {
        document.getElementById("error").style.display = "block";
        document.getElementById("password").value = "";
      }
    }
  </script>
</body>
</html>
