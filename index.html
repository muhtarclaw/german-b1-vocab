<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>German B1 Vocabulary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
    }
    .container {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2em;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
    }
    .date {
      text-align: center;
      background: #e63946;
      padding: 8px 20px;
      border-radius: 20px;
      display: inline-block;
      margin: 0 auto 30px;
      width: 100%;
    }
    .word-card {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border-left: 4px solid #e63946;
    }
    .word-card:hover {
      background: rgba(255,255,255,0.12);
    }
    .number {
      color: #e63946;
      font-weight: bold;
      margin-right: 10px;
    }
    .german {
      font-size: 1.4em;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .english {
      color: #aaa;
    }
    footer {
      text-align: center;
      margin-top: 30px;
      color: #666;
      font-size: 0.9em;
    }
    a { color: #e63946; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇩🇪 German B1</h1>
    <p class="subtitle">5 words every day</p>
    <div class="date">📅 2026-04-22</div>

    <div class="word-card">
      <div class="german"><span class="number">1.</span> die Umwelt</div>
      <div class="english">the environment</div>
    </div>

    <div class="word-card">
      <div class="german"><span class="number">2.</span> entwickeln</div>
      <div class="english">to develop</div>
    </div>

    <div class="word-card">
      <div class="german"><span class="number">3.</span> die Meinung</div>
      <div class="english">the opinion</div>
    </div>

    <div class="word-card">
      <div class="german"><span class="number">4.</span> bewerten</div>
      <div class="english">to evaluate, to assess</div>
    </div>

    <div class="word-card">
      <div class="german"><span class="number">5.</span> verändern</div>
      <div class="english">to change, to alter</div>
    </div>

    <footer>
      Powered by <a href="https://openclaw.ai">OpenClaw</a>
    </footer>
  </div>
</body>
</html>
