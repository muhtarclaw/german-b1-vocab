<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Usage Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #login-screen input { padding: 12px 20px; font-size: 18px; border: 2px solid #333; border-radius: 8px; background: #1a1a2e; color: #fff; margin-bottom: 16px; width: 300px; }
        #login-screen button { padding: 12px 40px; font-size: 18px; background: #6366f1; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        #login-screen button:hover { background: #4f46e5; }
        #login-error { color: #ef4444; margin-top: 12px; display: none; }
        
        /* Dashboard */
        #dashboard { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { font-size: 28px; color: #6366f1; }
        .header-info { color: #888; font-size: 14px; }
        .logout-btn { background: #374151; padding: 8px 20px; border: none; border-radius: 6px; color: #fff; cursor: pointer; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .account-card { background: #1a1a2e; border-radius: 16px; padding: 24px; border: 1px solid #333; }
        .account-card.exhausted { border-color: #ef4444; opacity: 0.7; }
        .account-card.active { border-color: #22c55e; box-shadow: 0 0 20px rgba(34,197,94,0.1); }
        .account-card h2 { font-size: 20px; margin-bottom: 20px; color: #a5b4fc; display: flex; align-items: center; gap: 10px; }
        .account-card.exhausted h2 { color: #f87171; }
        .account-card.active h2 { color: #4ade80; }
        .status-badge { font-size: 11px; background: #3730a3; padding: 4px 10px; border-radius: 20px; }
        .status-badge.exhausted { background: #dc2626; }
        .status-badge.active { background: #16a34a; }
        .status-badge.standby { background: #525252; }
        
        .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #252540; }
        .stat-row:last-child { border: none; }
        .stat-label { color: #9ca3af; }
        .stat-value { font-weight: 600; font-size: 18px; }
        .stat-value.prompt { color: #60a5fa; }
        .stat-value.completion { color: #34d399; }
        .stat-value.requests { color: #f472b6; }
        .stat-value.total { color: #fbbf24; }
        
        /* Token Bar */
        .token-bar { margin-top: 16px; background: #252540; border-radius: 8px; height: 24px; overflow: hidden; }
        .token-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width 0.5s ease; }
        .token-fill.high { background: linear-gradient(90deg, #f59e0b, #ef4444); }
        
        /* Refresh indicator */
        .refresh-info { text-align: center; color: #666; font-size: 12px; margin-top: 20px; }
        
        /* Footer */
        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #333; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <h1 style="margin-bottom: 30px; color: #6366f1;">🦾 Ollama Usage Dashboard</h1>
        <input type="password" id="password-input" placeholder="Enter password" onkeypress="if(event.key==='Enter')tryLogin()" />
        <button onclick="tryLogin()">Login</button>
        <div id="login-error">Incorrect password</div>
    </div>
    
    <!-- Dashboard -->
    <div id="dashboard" class="container">
        <div class="header">
            <div>
                <h1>🦾 Ollama Usage Dashboard</h1>
                <div class="header-info">Token usage across all accounts</div>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="header-info" id="last-updated"></div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="stats-grid" id="stats-grid">
            <!-- Populated by JS -->
        </div>
        
        <div class="refresh-info">
            Page auto-refreshes every 6 hours. Last data update: <span id="data-updated"></span>
        </div>
        
        <div class="footer">
            OpenClaw Ollama Token Tracker · muhtarclaw@proton.me
        </div>
    </div>
    
    <script>
        const PASSWORD = 'ghp.2026';
        let usageData = null;
        
        // Account order for display
        const ACCOUNT_ORDER = ['cv', 'mcv1', 'mcv2', 'cwm', 'cwm1', 'cwm2', 'mcw', 'mcw1', 'mcw2'];
        
        // Token display formatter
        function formatNumber(n) {
            if (n >= 1000000) return (n/1000000).toFixed(2) + 'M';
            if (n >= 1000) return (n/1000).toFixed(1) + 'K';
            return n || 0;
        }
        
        // Login
        function tryLogin() {
            const pw = document.getElementById('password-input').value;
            if (pw === PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
                // Auto-refresh every 6 hours
                setTimeout(() => location.reload(), 6 * 60 * 60 * 1000);
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }
        
        // Logout
        function logout() {
            document.getElementById('password-input').value = '';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('login-error').style.display = 'none';
        }
        
        // Format date
        function formatDate(isoString) {
            if (!isoString) return 'N/A';
            const d = new Date(isoString);
            return d.toLocaleString();
        }
        
        // Render account card
        function renderAccount(name, data) {
            const status = data.status || 'standby';
            const statusLabels = { active: 'ACTIVE', exhausted: 'EXHAUSTED', standby: 'STANDBY' };
            
            const cardClass = status === 'exhausted' ? 'exhausted' : status === 'active' ? 'active' : '';
            const badgeClass = status === 'exhausted' ? 'exhausted' : status === 'active' ? 'active' : 'standby';
            
            const prompt = data.prompt_tokens || 0;
            const completion = data.completion_tokens || 0;
            const total = data.total_tokens || (prompt + completion);
            const requests = data.requests || 0;
            
            // Estimate % based on typical quota (heuristic - we don't know actual quota)
            // Just show relative comparison
            const maxTokens = Math.max(...ACCOUNT_ORDER.map(a => usageData[a]?.total_tokens || 0));
            const pct = maxTokens > 0 ? Math.round((total / maxTokens) * 100) : 0;
            
            return `
                <div class="account-card ${cardClass}">
                    <h2>
                        ${name}
                        <span class="status-badge ${badgeClass}">${statusLabels[status]}</span>
                    </h2>
                    <div class="stat-row">
                        <span class="stat-label">Prompt Tokens</span>
                        <span class="stat-value prompt">${formatNumber(prompt)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Completion Tokens</span>
                        <span class="stat-value completion">${formatNumber(completion)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Total Tokens</span>
                        <span class="stat-value total">${formatNumber(total)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Requests</span>
                        <span class="stat-value requests">${requests}</span>
                    </div>
                    ${data.last_updated ? `
                    <div class="stat-row">
                        <span class="stat-label">Last Updated</span>
                        <span class="stat-value" style="font-size:14px;color:#888">${formatDate(data.last_updated)}</span>
                    </div>` : ''}
                    <div class="token-bar" style="margin-top: 16px;">
                        <div class="token-fill ${pct > 80 ? 'high' : ''}" style="width: ${pct}%"></div>
                    </div>
                </div>
            `;
        }
        
        // Load and render data
        function loadData() {
            // Embed current usage data directly (updated by cron)
            const embeddedData = EMBEDDED_USAGE_DATA;
            usageData = embeddedData;
            
            const grid = document.getElementById('stats-grid');
            grid.innerHTML = ACCOUNT_ORDER.map(name => {
                const data = usageData[name] || {};
                return renderAccount(name, data);
            }).join('');
            
            // Show last updated timestamp
            const timestamps = ACCOUNT_ORDER
                .map(a => usageData[a]?.last_updated)
                .filter(Boolean)
                .sort();
            const latest = timestamps[timestamps.length - 1];
            document.getElementById('data-updated').textContent = formatDate(latest);
            document.getElementById('last-updated').textContent = latest ? `Data: ${formatDate(latest)}` : '';
        }
    </script>
</body>
</html>
